<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHIHIRO Human Inst Sensor Viz ver.20260617a</title>
    <link rel="stylesheet" href="./styles.css?v=20260617j" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="app-viewport">
    <div class="app-shell" id="appShell">
      <div class="app-header">
        <header class="topbar">
          <h1><span id="appTitleText" class="app-title-text">SHIHIRO Human Inst Sensor Viz</span> <span class="app-version">ver.20260617a</span></h1>
          <div class="actions">
            <button id="bridgeButton" class="btn-bridge">Bridge · Teensy</button>
            <button id="connectButton" class="btn-serial">Serial Direct</button>
            <button id="disconnectButton" disabled>Disconnect</button>
            <label class="device-label">
              Target
              <select id="deviceProfileSelect" aria-label="Device profile">
                <option value="teensy" selected>Teensy 4.1</option>
                <option value="xiao">XIAO ESP32 S3</option>
              </select>
            </label>
            <button id="demoButton">Demo</button>
          </div>
        </header>
        <section class="status-strip">
          <div class="status-pill">
            <span class="label">Device</span>
            <span id="deviceStatus" class="device-status">—</span>
          </div>
          <div class="status-pill">
            <span class="label">Link</span>
            <span id="serialStatus">Disconnected</span>
          </div>
          <div class="status-pill">
            <span class="label">Browser</span>
            <span id="browserStatus">Checking...</span>
          </div>
          <div class="status-pill status-pill-wide">
            <span class="label">Last</span>
            <span id="lastLineType">none</span>
            <pre id="rawLine" class="raw-line-inline">No data yet.</pre>
          </div>
        </section>
      </div>

      <main class="content-grid">
        <div class="visual-row">
          <section class="panel viewer-panel">
            <div class="panel-header panel-header-tight">
              <h2>3D Preview</h2>
              <p class="axis-legend">X tip · Y left · Z up</p>
            </div>
            <div id="threeContainer" class="three-container"></div>
            <div class="legend">
              <span class="legend-gradient"></span>
              <span>piezo low → high</span>
            </div>
          </section>

          <div class="graph-column">
            <section class="panel graph-panel graph-panel-compact">
              <div class="panel-header panel-header-mini">
                <h2>Piezo</h2>
              </div>
              <canvas id="piezoCanvas" width="240" height="120"></canvas>
            </section>

            <section class="panel graph-panel graph-panel-compact">
              <div class="panel-header panel-header-mini">
                <h2>Mic</h2>
              </div>
              <canvas id="micCanvas" width="240" height="120"></canvas>
            </section>

            <section class="panel graph-panel graph-panel-compact">
              <div class="panel-header panel-header-mini">
                <h2>Accel</h2>
                <p class="axis-legend">X tip · Y left · Z up</p>
              </div>
              <canvas id="motionCanvas" width="240" height="120"></canvas>
            </section>

            <section class="panel graph-panel graph-panel-compact">
              <div class="panel-header panel-header-mini">
                <h2>Rotation</h2>
                <p class="axis-legend">X tip · Y left · Z up</p>
              </div>
              <canvas id="gyroCanvas" width="240" height="120"></canvas>
            </section>

            <section class="panel graph-panel graph-panel-compact">
              <div class="panel-header panel-header-mini">
                <h2>Mag</h2>
                <p class="axis-legend">X tip · Y left · Z up</p>
              </div>
              <canvas id="magCanvas" width="240" height="120"></canvas>
            </section>
          </div>
        </div>

        <section class="panel tuning-panel">
          <div class="tuning-head">
            <h2>Parameters</h2>
            <div class="tuning-actions">
              <button type="button" id="paramResetButton">Reset</button>
              <button type="button" id="paramCopyButton">M4L JSON</button>
            </div>
          </div>
          <div id="paramControls" class="param-strip"></div>
          <details class="param-export-wrap">
            <summary>M4L export</summary>
            <pre id="paramExportJson" class="param-export" aria-label="M4L export JSON"></pre>
          </details>
        </section>
      </main>
    </div>
    </div>

    <script type="module" src="./app.js?v=20260617j"></script>
  </body>
  </html>
