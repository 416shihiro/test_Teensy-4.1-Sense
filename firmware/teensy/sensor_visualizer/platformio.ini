; Teensy 4.1 — sensor visualizer (standalone PIO project, like XIAO at repo root)
; Run from repo root:
;   pio run --project-dir firmware/teensy/sensor_visualizer -t upload

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200
lib_deps =
  adafruit/Adafruit MPU6050 @ ^2.2.6
  adafruit/Adafruit Unified Sensor @ ^1.1.14
