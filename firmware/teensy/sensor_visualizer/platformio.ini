; Teensy 4.1 — ICM-20948 + USB Audio (piezo L / mic R) + Serial telemetry
; Run from repo root:
;   pio run --project-dir firmware/teensy/sensor_visualizer -t upload
;
; USB type: Serial + MIDI + Audio (MIDI unused; Serial + Audio on one cable)

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200
lib_deps =
  sparkfun/SparkFun 9DoF IMU Breakout - ICM 20948 - Arduino Library@^1.3.2
build_unflags = -DUSB_SERIAL
build_flags =
  -DUSB_MIDI_AUDIO_SERIAL
  -DAUDIO_SAMPLE_RATE_EXACT=44100
